# ─────────────────────────────────────────────
#  Support Tawk — Configuration File
#  Fill in this file before running the server.
# ─────────────────────────────────────────────

site:
  name: "My Company"                 # Shown in admin panel and widget header
  domain: "https://yoursite.com"     # Domain where the widget is embedded
  logo_url: ""                       # Optional logo URL
  language: "en"                     # Admin panel & widget language: en | tr

server:
  host: "0.0.0.0"
  port: 8000
  secret_key: "CHANGE_THIS_TO_A_STRONG_RANDOM_KEY"   # JWT signing key — change this!
  cors_origins:                      # Origins allowed for the widget (* = all)
    - "*"

admin:
  default_username: "admin"
  default_password: "admin123"       # Change this after first login!
  session_hours: 24

database:
  type: "sqlite"                     # sqlite | postgres | mysql
  path: "./data/support.db"         # SQLite only
  # For Postgres/MySQL, fill in the following:
  # host: "localhost"
  # port: 5432
  # name: "support_tawk"
  # username: "dbuser"
  # password: "dbpassword"

chat:
  widget_color: "#2563eb"            # Chat button color (hex)
  welcome_message: "Hello! How can I help you?"
  offline_message: "We're offline right now. Leave a message and we'll get back to you."
  response_time_text: "Usually replies within a few minutes"
  notification_sound: true

limits:
  max_file_size_mb: 10              # File upload limit
  max_image_size_mb: 5              # Image upload limit
  allowed_file_types:
    - "jpg"
    - "jpeg"
    - "png"
    - "gif"
    - "pdf"
    - "doc"
    - "docx"
    - "txt"
    - "zip"
  max_message_length: 4000
  conversations_per_page: 20

ai:
  enabled: false
  provider: "openai"                 # openai | anthropic | none
  api_key: ""
  model: "gpt-3.5-turbo"           # OpenAI: gpt-3.5-turbo, gpt-4 | Anthropic: claude-haiku-4-5-20251001
  system_prompt: |
    You are a customer support assistant. Be polite and helpful.
    If you don't have enough information to answer, direct the user to a human agent.
  auto_reply: true                   # Auto-reply when no agent is available
  handoff_message: "Connecting you to a support agent, please wait."
  confidence_threshold: 0.7         # AI won't reply below this threshold; human takes over
